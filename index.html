<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朝の会 ミニトーク</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    overflow-x: hidden;
  }

  h1 {
    color: #fff;
    font-size: 2rem;
    font-weight: 800;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    margin-bottom: 10px;
    text-align: center;
  }

  .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 0.95rem;
    margin-bottom: 35px;
    text-align: center;
  }

  .card {
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    padding: 35px 30px;
    margin-bottom: 30px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
  }

  .card.theme-card::before {
    background: linear-gradient(90deg, #f093fb, #f5576c, #fda085);
  }

  .card.name-card::before {
    background: linear-gradient(90deg, #4facfe, #00f2fe, #43e97b);
  }

  .card-icon {
    font-size: 2.5rem;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #555;
    margin-bottom: 20px;
  }

  .slot-window {
    background: linear-gradient(180deg, #f8f9ff, #eef1ff);
    border: 3px solid #e0e4f5;
    border-radius: 16px;
    padding: 25px 20px;
    margin-bottom: 25px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .slot-window.spinning {
    border-color: #a78bfa;
    animation: borderPulse 0.6s ease-in-out infinite alternate;
  }

  @keyframes borderPulse {
    from { border-color: #a78bfa; box-shadow: 0 0 0px rgba(167,139,250,0); }
    to   { border-color: #7c3aed; box-shadow: 0 0 16px rgba(167,139,250,0.5); }
  }

  .slot-text {
    font-size: 1.35rem;
    font-weight: 700;
    color: #4a4a6a;
    line-height: 1.5;
  }

  .slot-text.placeholder {
    color: #b0b0c8;
    font-weight: 400;
    font-size: 1.1rem;
  }

  .slot-text.decided {
    color: #6c2bd9;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .name-slot .slot-text.decided {
    font-size: 2rem;
    color: #0891b2;
  }

  @keyframes popIn {
    0%   { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }

  /* ボタンエリア */
  .btn-group {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 16px 36px;
    border: none;
    border-radius: 50px;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn:active:not(:disabled) {
    transform: scale(0.95);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
  }

  /* スタートボタン */
  .btn-start-theme {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    box-shadow: 0 8px 25px rgba(245,87,108,0.4);
  }
  .btn-start-theme:hover:not(:disabled) {
    box-shadow: 0 12px 35px rgba(245,87,108,0.55);
    transform: translateY(-2px);
  }

  .btn-start-name {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    box-shadow: 0 8px 25px rgba(79,172,254,0.4);
  }
  .btn-start-name:hover:not(:disabled) {
    box-shadow: 0 12px 35px rgba(79,172,254,0.55);
    transform: translateY(-2px);
  }

  /* ストップボタン */
  .btn-stop {
    background: linear-gradient(135deg, #ff6b6b, #ee0979);
    box-shadow: 0 8px 25px rgba(238,9,121,0.4);
    animation: stopPulse 0.8s ease-in-out infinite alternate;
  }
  .btn-stop:hover:not(:disabled) {
    box-shadow: 0 12px 35px rgba(238,9,121,0.6);
    transform: translateY(-2px);
  }

  @keyframes stopPulse {
    from { box-shadow: 0 8px 25px rgba(238,9,121,0.4); }
    to   { box-shadow: 0 8px 35px rgba(238,9,121,0.75); }
  }

  .number-badge {
    display: inline-block;
    background: #a78bfa;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
  }

  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1000;
  }

  .confetti {
    position: absolute;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-10px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  footer {
    color: rgba(255,255,255,0.6);
    font-size: 0.8rem;
    margin-top: 20px;
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.5rem; }
    .card { padding: 25px 18px; }
    .slot-text { font-size: 1.15rem; }
    .name-slot .slot-text.decided { font-size: 1.5rem; }
    .btn { padding: 14px 26px; font-size: 1rem; }
  }
</style>
</head>
<body>

<h1>☀️ 朝の会 ミニトーク</h1>
<p class="subtitle">長期研修員のみなさん、おはようございます！</p>

<!-- テーマカード -->
<div class="card theme-card">
  <div class="card-icon">🎰</div>
  <div class="card-title">今日のミニトークテーマ</div>
  <div class="slot-window" id="themeSlot">
    <div class="slot-text placeholder" id="themeText">スタートを押してね！</div>
  </div>
  <div class="number-badge" id="themeBadge" style="display:none">No. --</div>
  <div class="btn-group">
    <button class="btn btn-start-theme" id="themeStartBtn" onclick="startTheme()">
      ▶ スタート
    </button>
    <button class="btn btn-stop" id="themeStopBtn" onclick="stopTheme()" disabled style="display:none">
      ⏹ ストップ
    </button>
  </div>
</div>

<!-- 名前カード -->
<div class="card name-card">
  <div class="card-icon">💬</div>
  <div class="card-title">今日はあなたの意見が聞きたい❤️</div>
  <div class="slot-window name-slot" id="nameSlot">
    <div class="slot-text placeholder" id="nameText">スタートを押してね！</div>
  </div>
  <div class="btn-group">
    <button class="btn btn-start-name" id="nameStartBtn" onclick="startName()">
      ▶ スタート
    </button>
    <button class="btn btn-stop" id="nameStopBtn" onclick="stopName()" disabled style="display:none">
      ⏹ ストップ
    </button>
  </div>
</div>

<footer>Mini Talk App — 朝の会をもっと楽しく</footer>
<div class="confetti-container" id="confettiContainer"></div>

<script>
// ===== テーマ一覧 =====
const themes = [
  "最近ハマっていること",
  "子どもの頃の夢は何だった？",
  "休日の過ごし方",
  "自分を動物に例えると？",
  "人生で一番おいしかったもの",
  "行ってみたい国・場所",
  "最近読んだ本・観た映画",
  "自分の隠れた特技",
  "朝型？夜型？その理由",
  "無人島に一つだけ持っていくなら？",
  "学生時代に一番好きだった教科",
  "最近買ってよかったもの",
  "自分の地元の好きなところ",
  "得意料理はある？",
  "小学生の自分に一言伝えるなら？",
  "教員になったきっかけ",
  "今まで一番うれしかった生徒の言葉",
  "自分の担当教科の「ここが面白い！」",
  "他の教科を教えるなら何を選ぶ？",
  "授業で大失敗したエピソード",
  "尊敬する先生（恩師）の話",
  "生徒から学んだこと",
  "小学校と高校、ここが違う！",
  "教員生活で一番成長したと思う瞬間",
  "おすすめの授業ネタ・教材",
  "教員になって驚いたこと",
  "生徒にウケた鉄板ネタ",
  "学校行事で一番好きなもの",
  "保護者に言われて印象に残っている言葉",
  "職員室での自分の過ごし方",
  "教員をやっていて一番大変なこと",
  "新任の頃の自分に声をかけるなら？",
  "担任と教科担当、どっちが好き？",
  "忘れられない卒業式のエピソード",
  "教え子との再会エピソード",
  "大切にしている言葉・座右の銘",
  "10年後の自分はどうなっていたい？",
  "「大人になってわかったこと」",
  "もし1日だけ別の職業を体験できるなら？",
  "人生で一番大きな決断",
  "自分の性格で好きなところ",
  "ストレス解消法は？",
  "「これだけは譲れない」こだわり",
  "もし100万円もらったら何に使う？",
  "幸せを感じる瞬間",
  "人生のターニングポイント",
  "最近感動したこと",
  "自分を一言で表すと？",
  "やめてよかった習慣・始めてよかった習慣",
  "「あの時やっておけばよかった」と思うこと",
  "AIは教育をどう変えると思う？",
  "子どもに一番身につけてほしい力は？",
  "「いい先生」とはどんな先生？",
  "学校の「当たり前」で変えたいこと",
  "自分が生徒だったら、自分の授業を受けたい？",
  "教科書に載せたい内容を一つ追加するなら？",
  "学校教育で一番大事な時間は？",
  "宿題は必要だと思う？",
  "教員の働き方改革、理想と現実",
  "地域との連携で印象的だったこと",
  "20年後の学校はどうなっていると思う？",
  "夏と冬、どっちが好き？",
  "猫派？犬派？",
  "タイムマシンで過去と未来、どっちに行く？",
  "カレーは甘口派？辛口派？",
  "インドア派？アウトドア派？",
  "山と海、どっちが好き？",
  "朝ごはんはパン派？ごはん派？",
  "旅行は計画派？ノープラン派？",
  "電話派？メール・チャット派？",
  "きのこの山？たけのこの里？",
  "生まれ変わるなら男？女？",
  "一生食べ続けるなら和食？洋食？",
  "都会暮らし？田舎暮らし？",
  "映画館派？おうち映画派？",
  "コーヒー派？お茶派？",
  "生徒に「先生の印象」を聞いたら何て言われそう？",
  "教員あるある（共感を求む！）",
  "自分の地元の自慢を30秒で！",
  "最近の「小さな幸せ」",
  "前世があるとしたら何だったと思う？",
  "研修が終わったら一番にやりたいこと",
  "このメンバーへの第一印象（正直に！）",
  "もし透明人間になれたら何をする？",
  "自分のテーマソングを選ぶなら？",
  "宝くじが当たっても教員を続ける？",
  "今の自分を漢字一文字で表すと？",
  "校長先生になったら最初にやること",
  "生徒と本気で勝負して勝てること",
  "自分を色に例えると何色？",
  "この研修を終えた未来の自分に一言！",
  "最近の推しは？",
  "最後の晩餐には何を食べる？",
  "最近感動した話",
  "最近驚いた話",
  "人生で最も笑った話",
  "今日から死ぬまで同じ飲み物しか飲めないとしたら何を飲む？",
  "今日から死ぬまで同じ食べ物しか食べられないとしたら何を食べる？",
  "死ぬまでにやりたいことトップ３",
  "人生で最も怒った話"
];

// ===== 名前一覧 =====
const names = [
  "親川翔吾先生",
  "島袋恵人先生",
  "金城弥恵先生",
  "田仲康希先生",
  "中村千草先生",
  "堀川晋太朗先生",
  "宮城翔太先生",
  "東小浜尚先生",
  "阿嘉鈴香先生"
];

// ===== Web Audio API =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playTick() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = 700 + Math.random() * 500;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.07, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.04);
}

function playDecide() {
  const ctx = getAudioCtx();
  [523, 659, 784, 1047].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    const t = ctx.currentTime + i * 0.1;
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.start(t); osc.stop(t + 0.35);
  });
}

function playFanfare() {
  const ctx = getAudioCtx();
  [392, 523, 659, 784, 1047].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = 'triangle';
    const t = ctx.currentTime + i * 0.12;
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.start(t); osc.stop(t + 0.4);
  });
}

// ===== 紙吹雪 =====
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#f093fb','#f5576c','#fda085','#4facfe','#00f2fe','#43e97b','#ffd700','#ff6b6b'];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    c.style.width  = (6 + Math.random() * 8) + 'px';
    c.style.height = (6 + Math.random() * 8) + 'px';
    c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    c.style.animationDelay   = Math.random() * 0.4 + 's';
    container.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// ===== スロット管理 =====
// theme
let themeTimer = null;
let themeInterval = 60;
let themeStopping = false;

function startTheme() {
  const textEl  = document.getElementById('themeText');
  const slotEl  = document.getElementById('themeSlot');
  const startBtn = document.getElementById('themeStartBtn');
  const stopBtn  = document.getElementById('themeStopBtn');
  const badge    = document.getElementById('themeBadge');

  badge.style.display = 'none';
  textEl.className = 'slot-text';
  slotEl.classList.add('spinning');
  startBtn.style.display = 'none';
  stopBtn.style.display  = 'inline-flex';
  stopBtn.disabled = false;
  themeStopping = false;
  themeInterval = 60;

  function tick() {
    const idx = Math.floor(Math.random() * themes.length);
    textEl.textContent = items_theme_last = themes[idx];
    items_theme_last_idx = idx;
    playTick();
    if (!themeStopping) {
      themeTimer = setTimeout(tick, themeInterval);
    } else {
      // 減速して止まる
      themeInterval += 35;
      if (themeInterval < 500) {
        themeTimer = setTimeout(tick, themeInterval);
      } else {
        // 確定
        slotEl.classList.remove('spinning');
        textEl.classList.add('decided');
        badge.style.display = 'inline-block';
        badge.textContent = 'No. ' + (items_theme_last_idx + 1);
        stopBtn.style.display  = 'none';
        startBtn.style.display = 'inline-flex';
        playDecide();
        launchConfetti();
      }
    }
  }
  tick();
}

let items_theme_last = '';
let items_theme_last_idx = 0;

function stopTheme() {
  themeStopping = true;
  document.getElementById('themeStopBtn').disabled = true;
}

// name
let nameTimer = null;
let nameInterval = 60;
let nameStopping = false;
let name_last_idx = 0;

function startName() {
  const textEl   = document.getElementById('nameText');
  const slotEl   = document.getElementById('nameSlot');
  const startBtn = document.getElementById('nameStartBtn');
  const stopBtn  = document.getElementById('nameStopBtn');

  textEl.className = 'slot-text';
  slotEl.classList.add('spinning');
  startBtn.style.display = 'none';
  stopBtn.style.display  = 'inline-flex';
  stopBtn.disabled = false;
  nameStopping = false;
  nameInterval = 60;

  function tick() {
    const idx = Math.floor(Math.random() * names.length);
    textEl.textContent = names[idx];
    name_last_idx = idx;
    playTick();
    if (!nameStopping) {
      nameTimer = setTimeout(tick, nameInterval);
    } else {
      nameInterval += 35;
      if (nameInterval < 500) {
        nameTimer = setTimeout(tick, nameInterval);
      } else {
        // 確定
        slotEl.classList.remove('spinning');
        textEl.classList.add('decided');
        stopBtn.style.display  = 'none';
        startBtn.style.display = 'inline-flex';
        playFanfare();
        launchConfetti();
      }
    }
  }
  tick();
}

function stopName() {
  nameStopping = true;
  document.getElementById('nameStopBtn').disabled = true;
}
</script>
</body>
</html>
